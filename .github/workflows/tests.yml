name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP for Composer bootstrap
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Prepare application bootstrap
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          cp .env.example .env

      - name: Start Sail services
        run: ./vendor/bin/sail up -d

      - name: Install frontend dependencies in Sail
        run: ./vendor/bin/sail npm ci

      - name: Generate application key in Sail
        run: ./vendor/bin/sail artisan key:generate

      - name: Build assets in Sail
        run: ./vendor/bin/sail npm run build

      - name: Run test suite in Sail
        run: ./vendor/bin/sail artisan test --compact

      - name: Stop Sail services
        if: always()
        run: ./vendor/bin/sail down -v
